<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TropicalFit">
  <meta name="theme-color" content="#0B3954">
  <meta name="description" content="Track your gains, island style">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

<body>
  <video id="bg-video" autoplay muted playsinline>
    <source src="bg.mp4" type="video/mp4">
  </video>
  <script>
    // iOS PWA video loop + visibility resume fix
    (function () {
      const v = document.getElementById('bg-video');
      function play() { v.play().catch(() => {}); }
      v.addEventListener('ended', () => { v.currentTime = 0; play(); });
      v.addEventListener('pause',  () => { if (!v.ended) play(); });
      document.addEventListener('visibilitychange', () => { if (!document.hidden) play(); });
      window.addEventListener('pageshow', play);
      play();

      // Exposed so applyTheme() can swap day/night video
      window.setBgVideo = function (src) {
        if (v.getAttribute('data-src') === src) return;
        v.setAttribute('data-src', src);
        const t = v.currentTime;
        v.src = src;
        v.load();
        play();
      };
    })();
  </script>
  <canvas id="ocean-shader"></canvas>
  <canvas id="palm-canvas" style="position:fixed; top:0; left:0; width:100vw; height:100vh; pointer-events:none; z-index:-1;"></canvas>
