<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;

  // 1. Background Gradient (Deep Ocean)
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#087E8B'); // Teal
  grad.addColorStop(1, '#0B3954'); // Deep Ocean
  ctx.fillStyle = grad;
  
  // Robust Rounded Rect
  const r = s * 0.22;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  // 2. Tropical Wave (Bottom)
  ctx.fillStyle = 'rgba(26, 160, 152, 0.5)';
  ctx.beginPath();
  ctx.moveTo(0, s * 0.7);
  for (let x = 0; x <= s; x += 10) {
    ctx.lineTo(x, s * 0.75 + Math.sin(x * 0.05) * (s * 0.03));
  }
  ctx.lineTo(s, s);
  ctx.lineTo(0, s);
  ctx.fill();

  // 3. The Main Icon (Centered)
  // Shadow for depth
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.shadowBlur = s * 0.05;
  ctx.shadowOffsetY = s * 0.02;

  ctx.font = `bold ${s * 0.45}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🏋️', s * 0.5, s * 0.45);
  
  // Clean up shadow
  ctx.shadowColor = 'transparent';

  // 4. Accent Palm
  ctx.font = `${s * 0.15}px serif`;
  ctx.fillText('🌴', s * 0.2, s * 0.2);
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
</script>
</body>
</html>
