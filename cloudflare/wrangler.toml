name = "tropicalfit"
main = "cloudflare/worker.js"
compatibility_date = "2024-01-01"

# ── 1. Paste the database_id from: wrangler d1 create tropicalfit ──
[[d1_databases]]
binding       = "DB"
database_name = "tropicalfit"
database_id   = "dea81b5a-2b46-4e81-a027-1b13df6ab365"

# ── 2. Your email (used in push notification headers) ──────────────
[vars]
VAPID_SUBJECT = "mailto:chslinde@gmail.com"

# ── 3. Run these two commands in terminal (do NOT put keys here) ───
# wrangler secret put VAPID_PUBLIC_KEY
# wrangler secret put VAPID_PRIVATE_KEY
