name = "tropicalfit"
main = "cloudflare/worker.js"
compatibility_date = "2024-01-01"

# ── Fill these in after running the setup commands ──────────────
# account_id = "PASTE_YOUR_ACCOUNT_ID_HERE"

[[d1_databases]]
binding     = "DB"
database_name = "tropicalfit"
database_id = "dea81b5a-2b46-4e81-a027-1b13df6ab365"

[vars]
VAPID_SUBJECT = "mailto:PASTE_YOUR_EMAIL_HERE"

# VAPID keys go in Secrets (never in wrangler.toml):
# wrangler secret put VAPID_PUBLIC_KEY
# wrangler secret put VAPID_PRIVATE_KEY
